<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticketing System - Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🎫 Ticketing System</h1>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#" data-page="events" class="nav-link active">Events</a>
                <a href="#" data-page="tickets" class="nav-link" id="myTicketsLink" style="display: none;">My Tickets</a>
                <a href="#" data-page="organizer" class="nav-link" id="organizerLink" style="display: none;">Organizer</a>
                <button class="btn btn-secondary" id="loginBtn">Login</button>
                <button class="btn btn-primary" id="signupBtn">Sign Up</button>
                <div class="user-menu" id="userMenu" style="display: none;">
                    <span id="userEmail"></span>
                    <button class="btn btn-secondary" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Events Page -->
        <div id="eventsPage" class="page active">
            <div class="page-header">
                <h2>Upcoming Events</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search events...">
                    <button class="btn btn-primary" id="searchBtn">Search</button>
                </div>
            </div>
            <div id="eventsList" class="events-grid">
                <div class="loading">Loading events...</div>
            </div>
        </div>

        <!-- Tickets Page -->
        <div id="ticketsPage" class="page">
            <div class="page-header">
                <h2>My Tickets</h2>
            </div>
            <div id="ticketsList" class="tickets-list">
                <!-- Tickets will be loaded here -->
            </div>
        </div>

        <!-- Organizer Page -->
        <div id="organizerPage" class="page">
            <div class="page-header">
                <h2>Organizer Dashboard</h2>
                <button class="btn btn-primary" id="createEventBtn">Create Event</button>
            </div>
            <div id="organizerStats" class="stats-grid">
                <!-- Stats will be loaded here -->
            </div>
            <div id="organizerEvents" class="events-grid">
                <!-- Organizer events will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <p class="form-footer">Don't have an account? <a href="#" id="switchToSignup">Sign up</a></p>
            </form>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Sign Up</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="signupPhone">Phone (optional)</label>
                    <input type="tel" id="signupPhone">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                <p class="form-footer">Already have an account? <a href="#" id="switchToLogin">Login</a></p>
            </form>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <div id="eventDetails">
                <!-- Event details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Create Event Modal -->
    <div id="createEventModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close">&times;</span>
            <h2>Create Event</h2>
            <form id="createEventForm">
                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" required>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Description</label>
                    <textarea id="eventDescription" rows="4" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="eventDate">Date</label>
                        <input type="datetime-local" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="eventCapacity">Capacity</label>
                        <input type="number" id="eventCapacity" required min="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="eventPrice">Ticket Price ($)</label>
                        <input type="number" id="eventPrice" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="eventLocation">Location</label>
                        <input type="text" id="eventLocation" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Event</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
