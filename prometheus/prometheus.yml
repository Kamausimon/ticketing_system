global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ticketing-system'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"
  - "recording_rules.yml"

# Scrape configurations
scrape_configs:
  # Ticketing System API
  - job_name: 'ticketing_api'
    static_configs:
      - targets: ['172.22.29.124:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (for system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # cAdvisor (for container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
