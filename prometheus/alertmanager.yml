global:
  resolve_timeout: 5m
  # Slack webhook URL (replace with your own)
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  # Default receiver
  receiver: 'default'
  
  # How long to wait before sending a notification about new alerts
  group_wait: 10s
  
  # How long to wait before sending notification about new alerts for a group
  group_interval: 10s
  
  # How long to wait before resending an alert
  repeat_interval: 12h
  
  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']
  
  # Child routes
  routes:
    # Critical alerts go to PagerDuty
    - match:
        severity: critical
      receiver: 'pagerduty'
      continue: true
    
    # Business alerts go to Slack business channel
    - match:
        category: business
      receiver: 'slack-business'
      group_wait: 30s
    
    # Performance alerts go to Slack tech channel  
    - match:
        category: performance
      receiver: 'slack-tech'
    
    # Payment alerts go to both channels
    - match:
        category: payments
      receiver: 'slack-business'
      continue: true
    - match:
        category: payments
      receiver: 'slack-tech'

# Receivers
receivers:
  - name: 'default'
    email_configs:
      - to: 'alerts@ticketing-system.com'
        from: 'alertmanager@ticketing-system.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'your-email@gmail.com'
        auth_password: 'your-app-password'
  
  - name: 'slack-business'
    slack_configs:
      - channel: '#business-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true
  
  - name: 'slack-tech'
    slack_configs:
      - channel: '#tech-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true
  
  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'

# Inhibition rules (prevent certain alerts when others are firing)
inhibit_rules:
  # Inhibit low severity alerts if high severity alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
  
  # Don't alert about high latency if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '^(HighLatency|HighErrorRate)$'
    equal: ['cluster', 'service']
